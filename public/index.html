<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dilxhan</title>
  <meta name="description" content="Dilxhan — personal site." />

  <!-- Fraunces (display, variable: weight + SOFT axis) + JetBrains Mono (UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,100..900,0..100&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- Theme toggle: slider with 💧 (light) → ♨️ (dark) -->
  <button
    id="theme-toggle"
    class="theme-toggle"
    role="switch"
    aria-checked="false"
    aria-label="Toggle dark mode"
    title="Toggle theme (D)"
  >
    <span class="theme-toggle__track" aria-hidden="true">
      <span class="theme-toggle__label theme-toggle__label--light">💧</span>
      <span class="theme-toggle__handle">
        <svg class="theme-toggle__drop" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3.5C12 3.5 5.5 10.8 5.5 15.2C5.5 18.78 8.41 21.5 12 21.5C15.59 21.5 18.5 18.78 18.5 15.2C18.5 10.8 12 3.5 12 3.5Z"/>
        </svg>
      </span>
      <span class="theme-toggle__label theme-toggle__label--dark">♨️</span>
    </span>
  </button>

  <!-- Time-aware greeting, quiet, top-left -->
  <p id="greeting" class="greeting" aria-live="polite"></p>

  <main class="stage">

    <!-- Hero: Dilxhan, SVG-clipped scene inside the letters -->
    <section class="hero" aria-label="Dilxhan">
      <svg
        class="hero__svg"
        viewBox="0 0 1000 260"
        preserveAspectRatio="xMidYMid meet"
        role="img"
        aria-label="Dilxhan"
      >
        <defs>
          <clipPath id="hero-text-clip">
            <text x="50%" y="195" text-anchor="middle" class="hero__text-path">Dilxhan</text>
          </clipPath>
          <linearGradient id="hero-sky-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" class="hero__sky-stop-1" />
            <stop offset="100%" class="hero__sky-stop-2" />
          </linearGradient>
          <linearGradient id="hero-water-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" class="hero__water-stop-1" />
            <stop offset="100%" class="hero__water-stop-2" />
          </linearGradient>
          <filter id="hero-vapor-blur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.6" />
          </filter>
        </defs>

        <!-- Fallback flat text (shown if JS/clip unsupported, hidden otherwise via CSS) -->
        <text x="50%" y="195" text-anchor="middle" class="hero__text-fallback">Dilxhan</text>

        <!-- Scene, clipped to the text shape above -->
        <g clip-path="url(#hero-text-clip)" id="hero-scene">
          <rect x="0" y="0" width="1000" height="260" fill="var(--scene-air-bg, transparent)" id="hero-scene-air" />
          <path id="hero-water-body" fill="url(#hero-water-gradient)" d="" />
          <g id="hero-scene-elements"></g>
        </g>

        <!-- Outline removed — empty-state visibility now handled via
             the air-bg color contrast directly (see --scene-air-bg). -->
      </svg>

      <!-- Refill icon — appears only when the water-vessel hero is
           empty in dark mode; tapping it starts a manual refill.
           Shown/hidden entirely via hero-water-scene.js. -->
      <button type="button" class="hero__refill-icon" id="hero-refill-icon" aria-label="Refill">
        <svg viewBox="0 0 24 24"><path d="M12 3.5C12 3.5 5.5 10.8 5.5 15.2C5.5 18.78 8.41 21.5 12 21.5C15.59 21.5 18.5 18.78 18.5 15.2C18.5 10.8 12 3.5 12 3.5Z"/></svg>
      </button>
    </section>

    <!-- Socials -->
    <nav class="socials" id="socials" aria-label="Social links">
      <!-- populated by JS from /api/socials -->
    </nav>

    <!-- Hobby project tiles (icon-only, title appears on click) -->
    <section class="tiles" id="tiles" aria-label="Hobby projects">
      <!-- populated by JS from /api/hobby-projects -->
    </section>

    <!-- Command prompt -->
    <div class="prompt" id="prompt-bar">
      <span class="prompt__cursor" aria-hidden="true">|</span>
      <div class="prompt__field">
        <span class="prompt__typewriter" id="prompt-typewriter" aria-hidden="true"></span>
        <input
          type="text"
          id="prompt-input"
          class="prompt__input"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          inputmode="none"
          aria-label="Command input. Press slash or command K to focus. Type a word, or try a command."
        />
      </div>
    </div>

  </main>

  <!-- Custom on-screen keyboard — used on touch devices instead of
       the OS keyboard, so the page never zooms/scrolls to keep a
       native input in view. Built/shown only via JS. Draggable via
       the handle bar, resizable via the corner grip; both default
       to the original centered position/size on first open, then
       remember the user's last position/size for the rest of the
       session. Deliberately kept OUTSIDE <main class="stage"> — that
       element has its own CSS transform (the optical-centering
       nudge), and any transformed ancestor becomes a new containing
       block for position:fixed descendants, which was throwing off
       this element's actual on-screen position relative to its own
       inline left/top values. -->
  <div class="touch-keyboard" id="touch-keyboard" hidden>
    <div class="touch-keyboard__handle" id="touch-keyboard-handle" aria-hidden="true">
      <span class="touch-keyboard__handle-bar"></span>
    </div>
    <div class="touch-keyboard__rows" id="touch-keyboard-rows"></div>
    <div class="touch-keyboard__resize-grip" id="touch-keyboard-resize" aria-hidden="true"></div>
  </div>

  <!-- Tile detail popup -->
  <div class="popup" id="tile-popup" hidden>
    <div class="popup__card">
      <p class="popup__title" id="popup-title"></p>
      <p class="popup__desc" id="popup-desc"></p>
      <a class="popup__link" id="popup-link" href="#" target="_blank" rel="noopener">open →</a>
    </div>
  </div>

  <!-- Shortcuts overlay (triggered by ?) -->
  <div class="shortcuts" id="shortcuts-overlay" hidden>
    <div class="shortcuts__card">
      <p class="shortcuts__row"><kbd>/</kbd> or <kbd>⌘K</kbd><span>open command prompt</span></p>
      <p class="shortcuts__row"><kbd>D</kbd><span>toggle theme</span></p>
      <p class="shortcuts__row"><kbd>?</kbd><span>this</span></p>
      <p class="shortcuts__row"><kbd>esc</kbd><span>close</span></p>
      <p class="shortcuts__hint">try typing something into the prompt.</p>
    </div>
  </div>

  <!-- Layer where floating easter-egg reveals get injected -->
  <div class="reveal-layer" id="reveal-layer" aria-hidden="true"></div>

  <script src="/app.js" defer></script>
  <!-- <script src="/hero-scene.js" defer></script> -->  <!-- forest/fire concept, paused while evaluating the water-vessel concept below -->
  <script src="/hero-water-scene.js" defer></script>
  <script src="/dictionary-engine.js" defer></script>
  <script src="/command-palette.js" defer></script>
  <script src="/touch-keyboard.js" defer></script>
</body>
</html>
