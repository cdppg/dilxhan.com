# Cloudflare configuration for dilxhan.com
# This binds the D1 database to your Pages project's Functions,
# so /functions/api/*.js can query it as `env.DB`.

name = "dilxhan"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "dilxhan-db"
database_id = "075fe7fc-1e6c-4b2f-9cfb-adc7f87a871c"
